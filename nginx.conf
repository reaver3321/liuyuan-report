# Nginx configuration for liuyuan-report
# Deploy under /liuyuan-report path
# Copy this to: /etc/nginx/conf.d/liuyuan-report.conf

server {
    listen 80 default_server;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Liuyuan-report application
    location /liuyuan-report/ {
        alias /home/admin/liuyuan-report/dist/;
        try_files $uri $uri/ /liuyuan-report/index.html;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirect /liuyuan-report to /liuyuan-report/
    location = /liuyuan-report {
        return 301 /liuyuan-report/;
    }

    # Root location
    location / {
        return 404;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}
